<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
  <h2 style="color: #1e293b;">{{.Subject}}</h2>
  <table style="width: 100%; border-collapse: collapse; margin: 16px 0;">
    {{range .Fields}}
    <tr>
      <td style="padding: 8px 12px; border: 1px solid #e2e8f0; font-weight: 600; color: #475569;">{{.Key}}</td>
      <td style="padding: 8px 12px; border: 1px solid #e2e8f0; color: #1e293b;">{{.Value}}</td>
    </tr>
    {{end}}
  </table>
  <p style="color: #94a3b8; font-size: 12px;">
    Sent by claude-plane at {{.Timestamp}}
    {{if .AppURL}}<br><a href="{{.AppURL}}" style="color: #3b82f6;">View in App</a>{{end}}
  </p>
</body>
</html>
