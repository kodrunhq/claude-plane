<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="browserGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="bridgeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="subGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.03)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="420" rx="12" fill="url(#bgGrad)"/>

  <!-- Browser Box -->
  <rect x="30" y="40" width="200" height="280" rx="10" fill="url(#browserGrad)" opacity="0.15" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="30" y="40" width="200" height="36" rx="10" fill="url(#browserGrad)" opacity="0.3"/>
  <text x="130" y="64" text-anchor="middle" fill="#c4b5fd" font-size="14" font-weight="600">Browser</text>

  <rect x="50" y="90" width="160" height="28" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="130" y="109" text-anchor="middle" fill="#e2e8f0" font-size="11">React 19 SPA</text>

  <rect x="50" y="126" width="160" height="28" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="130" y="145" text-anchor="middle" fill="#e2e8f0" font-size="11">xterm.js Terminal</text>

  <rect x="50" y="162" width="160" height="28" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="130" y="181" text-anchor="middle" fill="#e2e8f0" font-size="11">Multi-View (2-6 panes)</text>

  <rect x="50" y="198" width="160" height="28" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="130" y="217" text-anchor="middle" fill="#e2e8f0" font-size="11">Zustand + TanStack</text>

  <rect x="50" y="234" width="160" height="28" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="130" y="253" text-anchor="middle" fill="#e2e8f0" font-size="11">DAG Editor (React Flow)</text>

  <rect x="50" y="270" width="160" height="28" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="130" y="289" text-anchor="middle" fill="#e2e8f0" font-size="11">Resizable Panels</text>

  <!-- Server Box -->
  <rect x="340" y="40" width="230" height="280" rx="10" fill="url(#serverGrad)" opacity="0.15" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="340" y="40" width="230" height="36" rx="10" fill="url(#serverGrad)" opacity="0.3"/>
  <text x="455" y="64" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="600">Server</text>

  <rect x="360" y="90" width="190" height="28" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="455" y="109" text-anchor="middle" fill="#e2e8f0" font-size="11">REST API + JWT Auth</text>

  <rect x="360" y="126" width="190" height="28" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="455" y="145" text-anchor="middle" fill="#e2e8f0" font-size="11">WebSocket Hub</text>

  <rect x="360" y="162" width="190" height="28" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="455" y="181" text-anchor="middle" fill="#e2e8f0" font-size="11">gRPC Agent Manager</text>

  <rect x="360" y="198" width="190" height="28" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="455" y="217" text-anchor="middle" fill="#e2e8f0" font-size="11">Job Engine + Scheduler</text>

  <rect x="360" y="234" width="190" height="28" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="455" y="253" text-anchor="middle" fill="#e2e8f0" font-size="11">Event Bus + Webhooks</text>

  <rect x="360" y="270" width="90" height="28" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="405" y="289" text-anchor="middle" fill="#e2e8f0" font-size="11">SQLite</text>

  <rect x="460" y="270" width="90" height="28" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="505" y="289" text-anchor="middle" fill="#e2e8f0" font-size="11">mTLS CA</text>

  <!-- Agent Box -->
  <rect x="680" y="40" width="220" height="208" rx="10" fill="url(#agentGrad)" opacity="0.15" stroke="#059669" stroke-width="1.5"/>
  <rect x="680" y="40" width="220" height="36" rx="10" fill="url(#agentGrad)" opacity="0.3"/>
  <text x="790" y="64" text-anchor="middle" fill="#6ee7b7" font-size="14" font-weight="600">Agent (per worker)</text>

  <rect x="700" y="90" width="180" height="28" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="790" y="109" text-anchor="middle" fill="#e2e8f0" font-size="11">Session Manager</text>

  <rect x="700" y="126" width="180" height="28" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="790" y="145" text-anchor="middle" fill="#e2e8f0" font-size="11">PTY + Scrollback</text>

  <rect x="700" y="162" width="180" height="28" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="790" y="181" text-anchor="middle" fill="#e2e8f0" font-size="11">Claude CLI Process</text>

  <rect x="700" y="198" width="180" height="28" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="790" y="217" text-anchor="middle" fill="#e2e8f0" font-size="11">gRPC Client (dials in)</text>

  <!-- Bridge Box -->
  <rect x="680" y="274" width="220" height="100" rx="10" fill="url(#bridgeGrad)" opacity="0.15" stroke="#d97706" stroke-width="1.5"/>
  <rect x="680" y="274" width="220" height="36" rx="10" fill="url(#bridgeGrad)" opacity="0.3"/>
  <text x="790" y="298" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="600">Bridge</text>

  <rect x="700" y="320" width="85" height="28" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="742" y="339" text-anchor="middle" fill="#e2e8f0" font-size="10">GitHub</text>

  <rect x="795" y="320" width="85" height="28" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="837" y="339" text-anchor="middle" fill="#e2e8f0" font-size="10">Telegram</text>

  <!-- Connection: Browser <-> Server -->
  <line x1="230" y1="140" x2="340" y2="140" stroke="#a78bfa" stroke-width="2" stroke-dasharray="6,3" filter="url(#glow)"/>
  <line x1="230" y1="158" x2="340" y2="158" stroke="#a78bfa" stroke-width="2" stroke-dasharray="6,3" filter="url(#glow)"/>
  <polygon points="336,137 340,140 336,143" fill="#a78bfa"/>
  <polygon points="234,155 230,158 234,161" fill="#a78bfa"/>

  <text x="285" y="128" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="500">HTTPS / WSS</text>
  <text x="285" y="175" text-anchor="middle" fill="#94a3b8" font-size="9">REST + WebSocket</text>

  <!-- Connection: Server <-> Agent -->
  <line x1="570" y1="140" x2="680" y2="140" stroke="#34d399" stroke-width="2" stroke-dasharray="6,3" filter="url(#glow)"/>
  <line x1="570" y1="158" x2="680" y2="158" stroke="#34d399" stroke-width="2" stroke-dasharray="6,3" filter="url(#glow)"/>
  <polygon points="676,137 680,140 676,143" fill="#34d399"/>
  <polygon points="574,155 570,158 574,161" fill="#34d399"/>

  <text x="625" y="128" text-anchor="middle" fill="#34d399" font-size="10" font-weight="500">gRPC / mTLS</text>
  <text x="625" y="175" text-anchor="middle" fill="#94a3b8" font-size="9">Bidirectional Stream</text>

  <!-- Connection: Bridge -> Server -->
  <line x1="680" y1="324" x2="570" y2="270" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#glow)"/>
  <polygon points="574,267 570,270 571,274" fill="#fbbf24"/>

  <text x="610" y="310" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="500">REST API</text>

  <!-- Footer note -->
  <text x="500" y="400" text-anchor="middle" fill="#64748b" font-size="11" font-style="italic">Agents dial in to the server — workers can be behind NATs and firewalls</text>
</svg>
