<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="browserGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="subGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.03)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="340" rx="12" fill="url(#bgGrad)"/>

  <!-- Browser Box -->
  <rect x="30" y="50" width="200" height="240" rx="10" fill="url(#browserGrad)" opacity="0.15" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="30" y="50" width="200" height="36" rx="10" fill="url(#browserGrad)" opacity="0.3"/>
  <text x="130" y="74" text-anchor="middle" fill="#c4b5fd" font-size="14" font-weight="600">Browser</text>

  <rect x="50" y="100" width="160" height="30" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="130" y="120" text-anchor="middle" fill="#e2e8f0" font-size="12">React 19 SPA</text>

  <rect x="50" y="142" width="160" height="30" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="130" y="162" text-anchor="middle" fill="#e2e8f0" font-size="12">xterm.js Terminal</text>

  <rect x="50" y="184" width="160" height="30" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="130" y="204" text-anchor="middle" fill="#e2e8f0" font-size="12">Zustand + TanStack</text>

  <rect x="50" y="226" width="160" height="30" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="130" y="246" text-anchor="middle" fill="#e2e8f0" font-size="12">DAG Editor (React Flow)</text>

  <!-- Server Box -->
  <rect x="330" y="50" width="220" height="240" rx="10" fill="url(#serverGrad)" opacity="0.15" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="330" y="50" width="220" height="36" rx="10" fill="url(#serverGrad)" opacity="0.3"/>
  <text x="440" y="74" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="600">Server</text>

  <rect x="350" y="100" width="180" height="30" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="440" y="120" text-anchor="middle" fill="#e2e8f0" font-size="12">REST API + JWT Auth</text>

  <rect x="350" y="142" width="180" height="30" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="440" y="162" text-anchor="middle" fill="#e2e8f0" font-size="12">WebSocket Hub</text>

  <rect x="350" y="184" width="180" height="30" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="440" y="204" text-anchor="middle" fill="#e2e8f0" font-size="12">gRPC Agent Manager</text>

  <rect x="350" y="226" width="85" height="30" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="392" y="246" text-anchor="middle" fill="#e2e8f0" font-size="12">SQLite</text>

  <rect x="445" y="226" width="85" height="30" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="487" y="246" text-anchor="middle" fill="#e2e8f0" font-size="12">Job Engine</text>

  <!-- Agent Box -->
  <rect x="650" y="50" width="220" height="240" rx="10" fill="url(#agentGrad)" opacity="0.15" stroke="#059669" stroke-width="1.5"/>
  <rect x="650" y="50" width="220" height="36" rx="10" fill="url(#agentGrad)" opacity="0.3"/>
  <text x="760" y="74" text-anchor="middle" fill="#6ee7b7" font-size="14" font-weight="600">Agent (per worker)</text>

  <rect x="670" y="100" width="180" height="30" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="760" y="120" text-anchor="middle" fill="#e2e8f0" font-size="12">Session Manager</text>

  <rect x="670" y="142" width="180" height="30" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="760" y="162" text-anchor="middle" fill="#e2e8f0" font-size="12">PTY + Scrollback</text>

  <rect x="670" y="184" width="180" height="30" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="760" y="204" text-anchor="middle" fill="#e2e8f0" font-size="12">Claude CLI Process</text>

  <rect x="670" y="226" width="180" height="30" rx="6" fill="url(#subGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="760" y="246" text-anchor="middle" fill="#e2e8f0" font-size="12">gRPC Client (dials in)</text>

  <!-- Connection: Browser <-> Server -->
  <line x1="230" y1="145" x2="330" y2="145" stroke="#a78bfa" stroke-width="2" stroke-dasharray="6,3" filter="url(#glow)"/>
  <line x1="230" y1="165" x2="330" y2="165" stroke="#a78bfa" stroke-width="2" stroke-dasharray="6,3" filter="url(#glow)"/>
  <!-- Arrows -->
  <polygon points="326,142 330,145 326,148" fill="#a78bfa"/>
  <polygon points="234,162 230,165 234,168" fill="#a78bfa"/>

  <text x="280" y="130" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="500">HTTPS/WSS</text>
  <text x="280" y="184" text-anchor="middle" fill="#94a3b8" font-size="9">REST + WebSocket</text>

  <!-- Connection: Server <-> Agent -->
  <line x1="550" y1="145" x2="650" y2="145" stroke="#34d399" stroke-width="2" stroke-dasharray="6,3" filter="url(#glow)"/>
  <line x1="550" y1="165" x2="650" y2="165" stroke="#34d399" stroke-width="2" stroke-dasharray="6,3" filter="url(#glow)"/>
  <!-- Arrows -->
  <polygon points="646,142 650,145 646,148" fill="#34d399"/>
  <polygon points="554,162 550,165 554,168" fill="#34d399"/>

  <text x="600" y="130" text-anchor="middle" fill="#34d399" font-size="10" font-weight="500">gRPC / mTLS</text>
  <text x="600" y="184" text-anchor="middle" fill="#94a3b8" font-size="9">Bidirectional Stream</text>

  <!-- Footer note -->
  <text x="450" y="318" text-anchor="middle" fill="#64748b" font-size="11" font-style="italic">Agents dial in to the server — workers can be behind NATs and firewalls</text>
</svg>
