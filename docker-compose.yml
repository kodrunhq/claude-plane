services:
  server:
    image: jurel89/claude-plane:latest
    ports:
      - "4200:4200"
      - "4201:4201"
    volumes:
      - data:/data
    environment:
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@localhost}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme123}
    restart: unless-stopped

volumes:
  data:
