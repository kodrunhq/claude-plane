name: Publish

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version
        id: version
        env:
          VERSION_BUMP: ${{ inputs.version_bump }}
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo "v0.0.0")
          CURRENT="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$VERSION_BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "### Version: v${NEW_VERSION} (${VERSION_BUMP} from ${LATEST_TAG})" >> "$GITHUB_STEP_SUMMARY"

      - name: Check tag does not exist
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists"
            exit 1
          fi

      # Build frontend FIRST — all subsequent Go compilations embed the real bundle.
      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Verify frontend build output
        run: |
          if [ ! -f internal/server/frontend/dist/index.html ]; then
            echo "::error::Frontend build did not produce index.html"
            exit 1
          fi
          ASSET_COUNT=$(find internal/server/frontend/dist/assets -name '*.js' 2>/dev/null | wc -l)
          if [ "$ASSET_COUNT" -eq 0 ]; then
            echo "::error::Frontend build produced no JS assets"
            exit 1
          fi
          echo "Frontend build OK: index.html + $ASSET_COUNT JS assets"

      - name: Vet
        run: go vet ./...

      - name: Test backend
        run: go test -race ./...

      - name: Test frontend
        working-directory: web
        run: |
          npx tsc --noEmit
          npm run lint
          npm run test -- --run

      - name: Smoke test (build all binaries + verify embeds)
        run: |
          bash scripts/build-agent-binaries.sh
          for f in internal/server/agentdl/binaries/claude-plane-agent-*; do
            if [ ! -s "$f" ]; then
              echo "::error::Agent binary missing or empty: $f"
              exit 1
            fi
            echo "OK $f ($(stat -c%s "$f") bytes)"
          done
          go build -o /tmp/claude-plane-server ./cmd/server
          go build -o /tmp/claude-plane-agent ./cmd/agent
          go build -o /tmp/claude-plane-bridge ./cmd/bridge
          /tmp/claude-plane-agent install-service --help > /dev/null 2>&1
          echo "OK agent install-service command present"
          /tmp/claude-plane-server version 2>/dev/null || true

      - name: Create and push tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git tag -a "$TAG" -m "release: $TAG"
          git push origin "$TAG"

      - name: Release with goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release artifacts
        run: |
          echo "==> Checking goreleaser dist/ output..."
          ls -la dist/server_linux_amd64_v1/ 2>/dev/null || ls -la dist/server_linux_amd64*/ 2>/dev/null
          ls -la dist/agent_linux_amd64_v1/ 2>/dev/null || ls -la dist/agent_linux_amd64*/ 2>/dev/null

          # Verify agent binary exists and has install-service.
          AGENT_BIN=$(find dist/ -name 'claude-plane-agent' -path '*linux_amd64*' | head -1)
          if [ -z "$AGENT_BIN" ]; then
            echo "::error::Agent binary not found in goreleaser dist/"
            exit 1
          fi
          "$AGENT_BIN" install-service --help > /dev/null 2>&1
          echo "OK goreleaser agent has install-service"

          # Verify server binary has frontend embedded (not just .gitkeep).
          SERVER_BIN=$(find dist/ -name 'claude-plane-server' -path '*linux_amd64*' | head -1)
          if [ -z "$SERVER_BIN" ]; then
            echo "::error::Server binary not found in goreleaser dist/"
            exit 1
          fi
          SERVER_SIZE=$(stat -c%s "$SERVER_BIN")
          # A server with only .gitkeep embedded is ~25MB; with frontend it's ~27MB+.
          # Use 26MB as a sanity threshold.
          MIN_SIZE=$((26 * 1024 * 1024))
          if [ "$SERVER_SIZE" -lt "$MIN_SIZE" ]; then
            echo "::error::Server binary suspiciously small (${SERVER_SIZE} bytes) — frontend may not be embedded"
            exit 1
          fi
          echo "OK server binary: ${SERVER_SIZE} bytes (frontend embedded)"
          echo "==> All release artifacts verified"

      # --- Docker: server image only ---

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.publish
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/kodrunhq/claude-plane:${{ steps.version.outputs.tag }}
            ghcr.io/kodrunhq/claude-plane:latest
            jurel89/claude-plane:${{ steps.version.outputs.tag }}
            jurel89/claude-plane:latest
