name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate goreleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: check

      - name: Stub frontend dist for embed
        run: mkdir -p internal/server/frontend/dist && touch internal/server/frontend/dist/.gitkeep

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Build server
        run: go build -o /dev/null ./cmd/server

      - name: Build agent
        run: go build -o /dev/null ./cmd/agent

  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test -- --run

      - name: Build
        run: npm run build
