version: 2
project_name: claude-plane

before:
  hooks:
    - bash -c "cd web && npm ci && npm run build && touch ../internal/server/frontend/dist/.gitkeep"
    - bash -c "VERSION={{ .Version }} COMMIT={{ .ShortCommit }} DATE={{ .Date }} bash scripts/build-agent-binaries.sh"

builds:
  - id: server
    binary: claude-plane-server
    main: ./cmd/server
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -X github.com/kodrunhq/claude-plane/internal/shared/buildinfo.Version={{ .Version }}
      - -X github.com/kodrunhq/claude-plane/internal/shared/buildinfo.Commit={{ .ShortCommit }}
      - -X github.com/kodrunhq/claude-plane/internal/shared/buildinfo.Date={{ .Date }}

  - id: agent
    binary: claude-plane-agent
    main: ./cmd/agent
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -X github.com/kodrunhq/claude-plane/internal/shared/buildinfo.Version={{ .Version }}
      - -X github.com/kodrunhq/claude-plane/internal/shared/buildinfo.Commit={{ .ShortCommit }}
      - -X github.com/kodrunhq/claude-plane/internal/shared/buildinfo.Date={{ .Date }}

  - id: bridge
    binary: claude-plane-bridge
    main: ./cmd/bridge
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -X github.com/kodrunhq/claude-plane/internal/shared/buildinfo.Version={{ .Version }}
      - -X github.com/kodrunhq/claude-plane/internal/shared/buildinfo.Commit={{ .ShortCommit }}
      - -X github.com/kodrunhq/claude-plane/internal/shared/buildinfo.Date={{ .Date }}

archives:
  - id: server
    ids: [server]
    formats: [tar.gz]
    format_overrides:
      - goos: darwin
        formats: [zip]
    name_template: "claude-plane-server_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

  - id: agent
    ids: [agent]
    formats: [tar.gz]
    format_overrides:
      - goos: darwin
        formats: [zip]
    name_template: "claude-plane-agent_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

  - id: bridge
    ids: [bridge]
    formats: [tar.gz]
    format_overrides:
      - goos: darwin
        formats: [zip]
    name_template: "claude-plane-bridge_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
